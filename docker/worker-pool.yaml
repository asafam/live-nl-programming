# LNL OpenClaw Worker Pool Configuration
#
# Used with: python -m src.data.evaluate_baseline --pool docker/worker-pool.yaml
#
# Each worker entry maps to one Docker container started by docker-compose.yml.
# data_dir must match the bind-mount source for that worker in docker-compose.yml
# (LNL_POOL_DATA_DIR/worker-N, default /tmp/lnl-pool/worker-N).
#
# evaluate_baseline.py writes agent workspace files into data_dir on the host;
# the container reads them via the bind-mount at /home/node/.openclaw.
# The gateway auth token is read from data_dir/openclaw.json (written by the
# container entrypoint on startup).

workers:
  - name: worker-1
    container_name: lnl-oc-worker-1
    gateway_url: ws://localhost:19789
    mock_server_url: http://localhost:19888
    data_dir: /tmp/lnl-pool/worker-1

  - name: worker-2
    container_name: lnl-oc-worker-2
    gateway_url: ws://localhost:19790
    mock_server_url: http://localhost:19889
    data_dir: /tmp/lnl-pool/worker-2

  - name: worker-3
    container_name: lnl-oc-worker-3
    gateway_url: ws://localhost:19791
    mock_server_url: http://localhost:19890
    data_dir: /tmp/lnl-pool/worker-3

  - name: worker-4
    container_name: lnl-oc-worker-4
    gateway_url: ws://localhost:19792
    mock_server_url: http://localhost:19891
    data_dir: /tmp/lnl-pool/worker-4
