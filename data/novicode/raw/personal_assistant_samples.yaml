  - ShoppingAgent passes the order details and the user-requested reminder date (November 21) to RemindersAgent.
  - 'RemindersAgent creates a reminder for 9:00 AM on November 21, titled ''Turkey delivery tomorrow! (Order #114-8823041-9923654
