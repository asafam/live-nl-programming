- id: rainy-morning-alarm-weather-conditional
  name: Rainy Morning Alarm Adjuster
  source_type: NoviCode/PersonalAssistant
  seed_utterance: If it's raining tomorrow morning, set my alarm for 7:30, if it's not, set my alarm for 8.
  actors:
  - name: WeatherAgent
    domain: weather
  - name: ClockAgent
    domain: clock
  raw_steps:
  - At 10:00 PM tonight, WeatherAgent checks tomorrow morning's forecast for Chicago.
  - WeatherAgent parses the hourly precipitation probability data and checks whether the probability of rain exceeds 50% during
    that morning window.
  - If the rain probability is above 50%, WeatherAgent flags the condition as 'rain expected' and passes this verdict to ClockAgent
    with the recommended wake-up time of 7:30 AM.
  - If the rain probability is 50% or below, WeatherAgent flags the condition as 'dry morning' and passes the verdict to ClockAgent
    with the recommended wake-up time of 8:00 AM.
  - ClockAgent receives the handoff from WeatherAgent and checks whether an existing morning alarm is already set; if one
    exists, it cancels it first to avoid duplicate alarms.
  - ClockAgent sets a new alarm for the appropriate time — either 7:30 AM or 8:00 AM — labeled 'Weather-adjusted wake-up'
    so the user knows which branch fired.
  - 'ClockAgent confirms the alarm was set and delivers a spoken notification: ''Alarm set for 7:30 AM — rain is expected
    tomorrow morning'' or ''Alarm set for 8:00 AM — tomorrow''s morning looks clear.'''
- id: taylor-swift-album-shopping-list-parallel
  name: Music and Shopping List Morning Kickoff
  source_type: NoviCode/PersonalAssistant
  seed_utterance: Play the new Taylor Swift album and pull up my shopping list for today.
  actors:
  - name: MusicAgent
    domain: music
  - name: ShoppingAgent
    domain: shopping
  raw_steps:
  - MusicAgent queries the Spotify catalog for Taylor Swift's most recently released studio album and identifies 'The Tortured
    Poets Department' (April 2024) as the latest full-length release.
  - MusicAgent begins streaming the album from track 1 ('Fortnight') on the user's default playback device — the Sonos speaker
    in the kitchen — at the user's preferred volume of 65%.
  - In parallel, ShoppingAgent opens the user's shared grocery list in AnyList, labeled 'Weekly Groceries — Active'.
  - 'ShoppingAgent filters the list to show only items flagged for today''s shopping trip: oat milk, sourdough bread, cherry
    tomatoes, and Greek yogurt (4 items, all from Trader Joe''s on Clark St.).'
  - ShoppingAgent reads the four items aloud over the kitchen speaker while music briefly ducks in volume, then restores full
    volume after the readout completes.
  - 'ShoppingAgent checks whether any items were added to the list within the last 12 hours — finds ''sparkling water (12-pack)''
    was added at 8:47 PM last night — and appends it to the spoken readout: ''Also added last night: sparkling water, 12-pack.'''
  - MusicAgent continues playback of the album continuously in the background.
- id: aunt-birthday-calendar-reminder-gift
  name: Aunt Birthday Calendar Lookup and Gift Reminder
  source_type: NoviCode/PersonalAssistant
  seed_utterance: Check my calendar for when my aunt's birthday is this month and then set a reminder for three days before,
    so I can remember to buy a gift.
  actors:
  - name: CalendarAgent
    domain: calendar
  - name: RemindersAgent
    domain: reminders
  raw_steps:
  - CalendarAgent scans all events in the user's Google Calendar for the current month (April 2026) and searches for events
    whose title or description contains 'birthday' or 'bday' or matches contacts tagged as family.
  - CalendarAgent finds a recurring annual event titled 'Aunt Carol's Birthday' on April 19, 2026, and confirms it falls within
    the current calendar month.
  - CalendarAgent extracts the exact date (April 19) and calculates three calendar days prior, arriving at April 16, 2026.
  - CalendarAgent passes the birthday date (April 19) and the reminder target date (April 16) to RemindersAgent, along with
    the event title for context.
  - RemindersAgent checks whether a reminder for Aunt Carol's birthday gift already exists on April 16 to avoid creating a
    duplicate; finding none, it proceeds to create one.
  - RemindersAgent creates a reminder for 10:00 AM on April 16, 2026, titled 'Buy birthday gift for Aunt Carol — her birthday
    is April 19' and adds it to the user's default Reminders list ('Personal').
  - 'RemindersAgent confirms the reminder was created and reads back: ''Done — I''ve set a reminder for April 16th at 10 AM
    to buy a gift for Aunt Carol''s birthday on the 19th.'''
- id: snow-boulder-dog-inside-text-lauren
