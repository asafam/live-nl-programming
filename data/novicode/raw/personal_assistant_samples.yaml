  raw_steps:
  - At 5:45 PM local time, WeatherAgent checks current weather conditions for Boulder, Colorado.
  - WeatherAgent inspects current conditions and checks whether active precipitation is categorized as snow (snow) rather
    than rain or mixed precipitation.
  - If snow is detected, WeatherAgent records the current snowfall rate (e.g., 0.4 in/hr), temperature (27°F), and condition
    label ('light snow') and passes all three to MessagingAgent.
  - If no snow is detected by 6:00 PM, the workflow exits silently — no message is sent and the user is not notified.
  - MessagingAgent looks up 'Lauren' in the user's contacts and resolves her to Lauren Mitchell, mobile number (303) 555-0182.
  - 'MessagingAgent composes an SMS: ''Hey Lauren — it''s snowing in Boulder right now (light snow, 27°F). Can you let Biscuit
    inside? Thanks!'' and sends it via the user''s default Messages app.'
  - MessagingAgent confirms the message was delivered to Lauren and reports the status to the user.
