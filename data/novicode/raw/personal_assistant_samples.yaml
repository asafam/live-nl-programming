- id: snow-forecast-thermostat-boost
  name: Snow Forecast Automatic Thermostat Boost
  source_type: NoviCode/PersonalAssistant
  seed_utterance: Adjust the thermostat up five degrees on days snow is forecasted.
  actors:
  - name: WeatherAgent
    domain: weather
  - name: SmartHomeAgent
    domain: smart_home
  raw_steps:
  - 'Each morning at 6:00 AM, WeatherAgent queries the National Weather Service point forecast for the user''s home location
    (Denver, CO 80203) and checks whether snow (precipitation type: snow or sleet) is in the forecast for any point during
    the current day.'
  - WeatherAgent checks the probability of precipitation and whether the NWS forecast text includes 'snow' or 'flurries' with
    at least 30% probability; if the condition is met, it flags the day as a snow-forecast day.
  - WeatherAgent reads the current thermostat setting by querying SmartHomeAgent for the Nest thermostat's active setpoint
    — finds it is set to 68°F (the default weekday heating setpoint).
  - WeatherAgent passes the 'snow expected' flag and the current setpoint (68°F) to SmartHomeAgent with an instruction to
    raise the heating setpoint by exactly 5 degrees to 73°F.
  - SmartHomeAgent connects to the Nest thermostat at the user's home and adjusts the heating setpoint from 68°F to 73°F,
    effective immediately.
  - 'SmartHomeAgent confirms the change was applied and logs the adjustment: ''Thermostat raised to 73°F — snow is in the
    forecast today (Denver, CO).'''
  - If no snow is in the forecast, the workflow exits silently and the thermostat remains at its default 68°F setting with
    no user notification.
- id: live-snow-thermostat-living-room
  name: Live Snowfall Living Room Heat Up to 78°F
  source_type: NoviCode/PersonalAssistant
  seed_utterance: As long as it's snowing outside, turn up the temperature of the living room to 78 degrees.
  actors:
  - name: WeatherAgent
    domain: weather
  - name: SmartHomeAgent
    domain: smart_home
  raw_steps:
  - WeatherAgent begins a real-time weather monitoring loop for the user's home location (Minneapolis, MN 55414), checking
    current conditions every 15 minutes.
  - WeatherAgent inspects weather conditions each cycle — it currently shows code 601 ('snow'), confirming active snowfall,
    so the heating condition is triggered.
  - WeatherAgent notifies SmartHomeAgent that snow is currently falling and requests the living room thermostat (Ecobee 'Living
    Room' zone) be set to 78°F.
  - SmartHomeAgent queries the current living room zone setpoint (finds 70°F) and raises it to 78°F, with the mode set to
    'Heat'.
  - 'SmartHomeAgent confirms: ''Living room raised to 78°F while it''s snowing outside. I''ll keep checking every 15 minutes
    and lower it back when the snow stops.'''
  - Every 15 minutes, WeatherAgent re-checks the live condition; as long as conditions remain snowy, SmartHomeAgent keeps
    the setpoint at 78°F.
  - When WeatherAgent detects the condition code has changed to 800 (clear) or cloudy skies, it signals SmartHomeAgent to
    revert the living room to 70°F.
  - 'SmartHomeAgent reverts the setpoint to 70°F and notifies the user: ''Snow has stopped — living room thermostat returned
    to 70°F.'''
