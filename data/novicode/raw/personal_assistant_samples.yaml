  - 'RemindersAgent confirms: ''Done — I''ve ordered 2 Honeysuckle White whole turkeys for delivery November 22nd ($179.98
    total) and set a reminder for November 21st at 9 AM so you''re prepared.'''
- id: amc-theater-eta-weather-outlook-tonight
  name: AMC Theater ETA and Tonight's Weather Briefing
  source_type: NoviCode/PersonalAssistant
  seed_utterance: How long will it take to get to AMC theater at 8pm tonight and tell me what tonight's weather outlook is.
  actors:
  - name: NavigationAgent
    domain: navigation
  - name: WeatherAgent
    domain: weather
  raw_steps:
  - NavigationAgent identifies the nearest AMC Theatres to the user's current address (2140 N Lincoln Ave, Chicago, IL) and
    finds 'AMC River East 21' at 322 E Illinois St, 3.1 miles away.
  - NavigationAgent queries Google Maps for driving conditions at 7:45 PM tonight (15-minute buffer before the 8:00 PM target
    arrival), factoring in historical and real-time Friday evening traffic.
  - NavigationAgent calculates the drive will take approximately 24 minutes, meaning the user should depart by 7:36 PM, and
    flags this as the recommended departure time.
  - 'NavigationAgent reports: ''AMC River East 21 is about 24 minutes away at 8 PM traffic — leave by 7:36 PM. Illinois Center
    Garage on E Wacker has parking, roughly 2 minutes'' walk.'''
  - In parallel, WeatherAgent fetches the National Weather Service hourly forecast for Chicago for tonight between 7:00 PM
    and midnight.
  - 'WeatherAgent summarizes the evening outlook: clear skies at departure (7:36 PM), temperatures dropping from 48°F to 41°F
    by midnight, with 15% chance of light rain after 10:30 PM.'
  - 'WeatherAgent advises: ''Tonight looks mostly clear — 48°F at 7:30 PM dropping to the low 40s by midnight. Very slight
    chance of drizzle after 10:30 PM, so a light jacket should be enough.'''
  - Both agents deliver their briefings in a single combined spoken response so the user gets the full picture at once.
