prompt: |
  # Task: Design the Distributed LLM-Object System

  You are a system architect. Given a concrete automation scenario, design the distributed LLM-object system that implements it.

  ---

  ## Automation

  **Name:** {NAME}
  **Domain:** {DOMAIN}

  **Steps:**
  {GROUNDED_STEPS}

  ---

  ## Instructions

  Identify every object needed and define it precisely. Each object is an LLM-agent with its own state, behavior, and peer relationships.

  ### Object categories

  1. **Service objects** — represent external systems (databases, messaging platforms, data stores, directory services, notification systems, etc.). Named by function as a slug (e.g., `notifications`, `record-store`, `org-directory`). One object per external system.

     - **Read services** represent external data APIs (org directories, product catalogs, user directories). They hold NO data in their own state — they retrieve it on demand by calling a tool. The behavior field MUST end with: "When answering queries, call the `{object_id}_data` tool to retrieve data." — replace `{object_id}` with this object's actual slug (using underscores, e.g., `org_directory_data`). Read services MUST reply with the requested data.

       **Important:** Any service that holds persistent data AND must answer lookup queries (e.g., a knowledge base, a Notion database used as a FAQ store, a policy document, a ticket store queried for status) MUST be a read service — NOT a write service. If a business logic object needs to ask a service a question and wait for the answer, that service is a read service with a `_data` tool.

     - **Write services** record what they receive and have initially empty state. Their state becomes the audit trail. Entry-point write services (those with `event_sources`) MUST declare the business logic object as a peer — without this peer, incoming events dead-end and the automation never runs.

     - **Dual-role objects** (a service that is BOTH a write target AND an event entry-point — e.g., a channel that receives outbound posts AND inbound user action events) MUST still declare the business logic object as a peer. A dual-role object's behavior MUST include: "When [action event] arrives, forward it to [business-logic-object] via peer message." The peer entry MUST be listed.

  2. **Business logic objects** — one per distinct domain of responsibility. Named as domain slugs (nouns describing *what they know*, not what they do): e.g., `approval-policy`, `incident-triage`, `onboarding-rules`, `pricing-engine`. **Never** name an object "orchestrator", "manager", "coordinator", "dispatcher", or any other generic control-flow role — those are architecture smells. Each object embodies a specific domain: it knows the rules of that domain, applies them to incoming messages, and sends outputs to its peers. There is no captain. Objects work in tandem — each one acts on its slice of the domain, forwarding to the next peer when its responsibility ends.

  ### Mandatory checklist

  Before writing any objects, answer these four questions:

  1. **What external systems send triggers, and how many distinct event types?** → One entry-point service object per DISTINCT event type. If the automation responds to multiple independent trigger types that each start a different workflow (e.g., Zendesk sends both `ticket.created` and `ticket.solved`, each causing different behavior), create a separate entry-point object for each. If all triggers are the same event type with different data values, one entry-point is correct. Never assign multiple unrelated event types to a single entry-point object's `event_sources`. Each entry-point must have a peer to the business logic object — without it, the trigger dead-ends.
  2. **What domain-specific decisions are required?** → One business logic object per domain. If the automation classifies, routes, approves, assigns, or enforces policy — there MUST be a business logic object named after that domain (e.g., `approval-policy`, `triage-rules`, `routing-logic`). It holds the rules; it does not orchestrate.
  3. **What factual external data does the business logic need to look up?** → For each lookup of factual data that is NOT already in the event payload (e.g., org charts, employee directories, product catalogs) — a read service object. If the data arrives in the trigger event itself (e.g., quote details, ticket fields, form values), do NOT create a read service for it — the business logic object reads it directly from the message. Business rules and approval policies go in the business logic object's behavior, NOT in a read service.
  4. **What external outputs does the automation produce?** → For each output channel (message sent, record written, notification triggered, ticket created) — a write service object.

  ### Object fields

  For each object, provide:

  1. `object_id` — slug format (lowercase, hyphens, e.g., `support-triage`, `org-directory`)
  2. `role` — one sentence: what is this object and what does it do
  3. `state_description` — what mutable state this object tracks at runtime (e.g., "Tracks open tickets with priority, assignee, and resolution status")
  4. `behavior` — domain logic rules using when/then patterns. Do NOT include communication instructions — peers handle routing. For read services, this MUST end with "When answering queries, call the `{object_id}_data` tool to retrieve data."

     **Fan-out rule:** When multiple peers must be notified or written simultaneously, describe them as a flat simultaneous list: "Send to X, Y, and Z." NEVER use sequential confirmation language ("after X confirms", "when X responds", "once X replies", "after X creates the record") for write services or notification services — callers must not wait for confirmation from write or notification peers. If the next step genuinely needs data that only a peer can provide (e.g., a generated document ID, a record key), model that peer as a read service with a `_data` tool, not a write service.

     **Slack channel names:** When a write service object posts to a Slack channel, the behavior MUST name the exact channel (e.g., `"post to the #sales-alerts channel"`). Never use vague descriptions like "the sales team channel" or "the relevant Slack channel" — the channel name must be a specific slug prefixed with `#` so downstream expectations can reference it exactly.
  5. `peers` — directional: only objects this one SENDS messages to. Each peer:
     - `object_id` — slug of the target
     - `relationship` — what is sent and when (e.g., "Forward quote details when a new quote arrives")
     Entry-point objects with `event_sources` MUST have at least one peer pointing to the business logic object.
  6. `skills` — purely internal capabilities requiring no external system calls (e.g., `calculate-totals`, `format-summary`). Omit if none.
  7. `subscriptions` — pub/sub topics this object listens to. Omit if none.
  8. `event_sources` — external triggers from outside the system boundary (e.g., `webhook: action event`, `external system: record created`). Only for entry-point service objects.

  ### Validation checklist

  Before finalizing:
  - Every object with `event_sources` has at least one peer (no dead-ends)
  - Every factual data lookup has a read service with the `_data` tool behavior ending
  - Business rules / domain policies are in business logic object behavior, NOT in a read service
  - Every output action has a write service object
  - At least one business logic object exists if the automation makes any decisions — and it is named after its domain, NOT "orchestrator" / "manager" / "coordinator"
  - Every peer `object_id` references an object that exists in the output
