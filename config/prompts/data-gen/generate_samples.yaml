user_prompt: |
  # Task: Instantiate Automation Template

  You are creating a concrete instance of an automation template.

  ---

  ## Template

  {TEMPLATE}

  ---

  ## Your Task

  Rewrite `raw_steps` as `steps`.

  **Must instantiate**:
  - "a designated channel" → specific channel name (e.g., "#support-tickets")
  - "a team" → specific team name (e.g., "Deal Desk Team")
  - "a team member" → specific team name (e.g., "a Deal Desk Team member")
  - "your FAQ knowledge base" → specific name (e.g., "IT Support FAQ")
  - "your [anything]" → specific name
  - "predefined options" → list the actual options
  - "Jira or ClickUp" → pick one

  **Do not**:
  - Instantiate individual people names unless explicitly a placeholder for a person
  - Add examples, including "e.g.", "like", or "such as"
  - Invent unnecessary details
  - Expand on the original meaning

  **Do not change**:
  - Steps that describe system behavior without placeholders
  - Steps that are already specific

  If a step needs no changes, copy it unchanged.

actor_style_addendum: |

  ## Additional: Actor-Style Rewriting

  In addition to instantiating placeholders, rewrite each step as an Actor-oriented program component description:

  - Each distinct functional/semantic domain maps to a dedicated Actor.
  - The first reference to a domain → "Create a [Domain] Actor that [action]"
  - Subsequent references to the same domain → "The [Name] Actor [action]"
  - Mark optional constraints with "(Optional: ...)"
  - Use active, imperative, program-component language.

  **Example transformation:**
  - Before: "A sales rep submits a new quote for approval in HubSpot Quotes"
  - After: "Create a HubSpot Quotes Actor that listens for new quote approval requests (Optional: from sales reps)"

  You must still instantiate all placeholders per the base instructions above.