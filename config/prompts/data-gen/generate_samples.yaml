base_prompt: |
  # Task: Instantiate Automation Template

  You are creating a concrete instance of an automation template.

  ---

  ## Template

  {TEMPLATE}

  ---

  ## Your Task

  Rewrite `raw_steps` as `steps`.

  **Must instantiate**:
  - "a designated channel" → a specific channel name
  - "a team" → a specific team name
  - "a team member" → a specific person's role within the team
  - "your [anything]" → a specific name
  - "predefined options" → list the actual options
  - "X or Y" → pick one

  **Do not**:
  - Instantiate individual people names unless explicitly a placeholder for a person
  - Add examples, including "e.g.", "like", or "such as"
  - Invent unnecessary details
  - Expand on the original meaning

plain_style_addendum: |

  ## Plain Style

  **Do not change**:
  - Steps that describe system behavior without placeholders
  - Steps that are already specific

  If a step needs no changes, copy it unchanged.

actor_style_addendum: |

  ## Object-Style Rewriting

  You are a system architect designing a distributed actors system. In addition to instantiating placeholders, rewrite the steps to describe program objects and their interactions.

  Each object is an **actor with its own internal state**. An actor holds all the data it needs to do its job — it does not need a separate object to store data for it.

  This is a two-phase task. Complete Phase 1 (object identification) before Phase 2 (step writing).

  ### Object categories

  Every object falls into one of two categories:

  1. **Platform objects** (`platform`) — one per external system mentioned (Slack, HubSpot, ClickUp, Jira, etc.). Named by brand. They only listen, read, write, or send through that platform. They hold no business logic and never act on their own — they are always triggered by another object.
  2. **Business logic objects** (`business_logic`) — one per distinct area of responsibility that involves decision-making, processing, routing, or orchestration. Named as domains (nouns), not actions (verbs). Each business logic actor owns its own data and state internally — it reads, writes, and queries its own data as part of its behavior. It interacts with the outside world only through platform objects.

  Each domain gets exactly one object. Never split a domain into multiple objects (e.g., "FAQ Table" + "FAQ Logic" should be one "FAQ" object; "Retrospectives" + "RetroDataStore" should be one "Retrospectives" object). Never name objects by implementation role (Table, Store, Logic, Handler, Manager, Processor) — name them after the domain they represent. Look at the template `name` field for the core domain concept.

  An object is only valid if it has independently modifiable behavior — its own way of reading, writing, formatting, or processing that can change without affecting other objects. If an object has no such behavior, fold it into the object that uses it.

  ### Phase 1 — Object identification (populate the `objects` array)

  Read all `raw_steps` first. Read the template `name` field to identify the core domain concept. Use it to guide object naming and grouping. Each business logic object should represent a complete domain (e.g., "Retrospectives" not "IncidentAnalyzer"). It owns its own data and logic — never create a separate object just to store data for it or just to run one step of its logic.

  Then identify every object needed:

  1. For each object, determine its `name`, `category` (one of `platform`, `business_logic`), and `responsibility` (one sentence describing what it does).
  2. For each object, list its `communicates_with` — an array of strings describing each edge to another object and what flows across it (e.g., `"queries FAQ for matching answers"`, `"sends notifications through Slack"`).
  3. Output all objects in the `objects` array before writing any steps.

  ### Phase 2 — Step writing (populate the `steps` array)

  Reference only objects declared in `objects`. Use "object" (never "Actor").

  Every object must be explicitly created before it is referenced:
  - First reference → "Create a [Name] object that [responsibility]"
  - Subsequent references → "[Name] [action]" (just the name)
  - When one object acts through another → "[X] [action] through [Y]"
  - Optional constraints → "(Optional: ...)"

  **Create-step ordering** — follow dependency order: if object A passes data to object B, create whichever acts first in the workflow first. All "Create" steps must come before any non-create steps that reference that object.

  **Communication mechanics** — every interaction between objects must state:
  - The initiating object
  - The receiving object
  - What is communicated

  When an object needs to reach a user or external system, the full pipeline must be stated. For example: "[BusinessLogic] sends [what] to the user through [Platform]". Platform objects are passive connectors — they never act alone. Every step involving a platform object must name the business logic object that triggers it. When a platform object receives external input (a user message, a webhook), the step must state which object the platform passes that input to.

  **Step patterns** — use these forms:
  - Platform receives external input → "[Platform] receives [what] and passes it to [BusinessLogic]"
  - Business logic acts on external system → "[BusinessLogic] [action] through [Platform]"
  - Business logic notifies a user → "[BusinessLogic] sends [what] to the user through [Platform]"
  - Business logic exchanges data with another → "[A] sends/queries [what] to/from [B]"

  Never write:
  - "[Platform] [does something]" without naming which object triggered it
  - "[Object] receives [something]" without naming who sent it
  - "[Platform] categorizes / processes / decides" — platforms are passive connectors

  **Information flow** — trace all data through the system:
  - If an object sends updates, state: where the event originates → which object processes it → which platform delivers it
  - If an object queries data, state what it queries and from which object
  - If consecutive steps describe branching (found/not-found, simple/complex), use explicit if/otherwise

  Describe what each object does and which objects it communicates with. Never describe implementation details (no "using AI", "with machine learning", etc.).

  ### Correctness

  Think like a programmer writing a program:
  - An object can only use data it has access to — if it queries or receives from another object, state that explicitly.
  - Platform objects are passive — they never initiate actions or make decisions. Another object always triggers them.
  - When consecutive steps describe alternative paths (one for a matched condition, another for the unmatched case), express them as explicit branching (if/otherwise).
  - Every output must have a traceable input — if an object sends updates, state which object provides the data and which platform object delivers it.
  - Every step that mentions an object receiving data must name the sending object. "[X] receives [what]" is always wrong — write "[X] receives [what] from [Y]" or "[Y] sends [what] to [X]".
  - Every object referenced in `steps` must appear in the `objects` array. Never introduce an object in steps that wasn't declared in Phase 1.

  You must still instantiate all placeholders per the base instructions above.
