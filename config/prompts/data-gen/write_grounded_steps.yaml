prompt: |
  # Task: Write Grounded Workflow Steps

  You are given a workflow's abstract template steps and the object system that implements them.
  Rewrite each template step as a grounded, implementation-agnostic description of what the
  workflow does — suitable for any team testing their own system against this benchmark.

  ---

  ## Template Steps (abstract)

  {TEMPLATE}

  ---

  ## Object System (use for grounding details only — do NOT expose internals)

  {OBJECTS}

  ---

  ## Instructions

  For each template step, write one grounded sentence or short paragraph that:
  - Describes what the workflow does at this step in business terms
  - Names the external SaaS platforms involved (e.g. HubSpot, Slack, Jira, Salesforce)
    where relevant — these are part of the workflow's identity, not implementation details
  - Grounds the logic with specific business rules drawn from the object system
    (e.g. "discount above 20%", "within 24 hours", "all required approvers must respond")
  - States any branching logic or conditions clearly

  Do NOT include implementation details that a different team would configure differently:
  - Object names, object IDs, or internal service identifiers
  - Specific channel names (e.g. "#quote-approvals"), table names, or field identifiers
  - The word "object" — write "the workflow", "the system", or use passive voice instead
  - Instance-specific values (person names, record IDs, dollar amounts, specific dates)
  - Behavior not present in the object system

  Do NOT:
  - Collapse multiple template steps into one
  - Skip any template step — output exactly one entry per template step, in order

  Keep each step concise: 1–3 sentences describing what the workflow does, readable by
  any team implementing or testing this kind of automation on their own infrastructure.

  ---

  ## Output

  Return strictly a JSON array of strings, one per template step, in the same order:
  ["grounded description of step 1", "grounded description of step 2", ...]
