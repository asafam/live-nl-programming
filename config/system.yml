# LLM parameters for deterministic behavior
llm:
  model: gpt-4o
  temperature: 0
  seed: 42

heartbeat:
  enabled: true
  interval: 30

features:
  proactivity: false
  self_reflection: true

prompts:
  coordinator: config/prompts/coordinator_actor.yml
  actor: config/prompts/actor.yml
  mediator: config/prompts/mediator.yml